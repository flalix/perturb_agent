[project]
name = "target_disc_perturb_project"
version = "0.1.0"
description = "target discovery pipeline"
requires-python = ">=3.11,<3.12"
dependencies = [
    "ipykernel",
    "pandas",
    "langchain",
    "protobuf>=4.25,<5",
    "langchain-core",
    "langchain-openai",
    "langchain-anthropic",
    "langchain-community",
    "langchain-model-profiles",
    "langchain-tavily",
    "langchain-chroma",
    "langchain-huggingface",
    "streamlit",
    "altair<6",
    "tavily-python",
    "tavily",
    "python-dotenv",
    "pypdf",
    "langchain-text-splitters",
    #    "mcp",
    #    "langchain-mcp-adapters",
    "langgraph",
    "langgraph-cli",
    "langgraph-api",
    "ipywidgets",
    "sounddevice",
    "scipy",
    #    "langchain-google-vertexai",
    "langchain-google-genai",
    "langsmith",
    "jupyterlab",
    "databricks>=0.2",
    "kivy>=2.3.1",
    "gradio>=6.10.0",
    "matplotlib>=3.10.8",
    "scikit-learn>=1.8.0",
    "seaborn>=0.13.2",
    "umap-learn>=0.5.11",
    "plotly>=6.6.0",
    "streamlit-aggrid>=1.2.1.post2",
]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

